# ─────────────────────────────────────────────────────────
# OneBrain Log Aggregation Stack
#
# Loki collects and stores logs from all Docker services.
# Services ship logs via the Loki Docker logging driver.
#
# Usage:
#   # 1. Install the Loki Docker driver (once per host):
#   docker plugin install grafana/loki-docker-driver:3.0.0 --alias loki --grant-all-permissions
#
#   # 2. Start the logging stack:
#   cd docker && docker compose -f docker-compose.logging.yml up -d
#
#   # 3. Configure other services to ship logs:
#   logging:
#     driver: loki
#     options:
#       loki-url: "http://localhost:3100/loki/api/v1/push"
#       loki-retries: "3"
#       loki-batch-size: "400"
#
# Retention: 30 days (720h)
# ─────────────────────────────────────────────────────────

services:
  loki:
    image: grafana/loki:3.0.0
    restart: unless-stopped
    ports:
      - '3100:3100'
    volumes:
      - loki_data:/loki
      - ./loki-config.yml:/etc/loki/local-config.yaml:ro
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ['CMD-SHELL', 'wget --spider -q http://localhost:3100/ready || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - logging
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

volumes:
  loki_data:
    name: onebrain-loki-data

networks:
  logging:
    name: onebrain-logging
