version: '3.9'

# ─────────────────────────────────────────────
# OneBrain EU Region
# Runs: API + PostgreSQL + Redis + MCP Server
# Strictly isolated — no shared DB with GLOBAL
# ─────────────────────────────────────────────

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-onebrain_eu}
      POSTGRES_USER: ${POSTGRES_USER:-onebrain}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - region-eu
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-onebrain}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD required}
    volumes:
      - redis_data:/data
    networks:
      - region-eu
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
      args:
        BUILD_COMMIT: ${BUILD_COMMIT:-unknown}
    restart: unless-stopped
    stop_grace_period: 35s
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '5'
    environment:
      - NODE_ENV=production
      - NODE_OPTIONS=--max-old-space-size=400
      - PORT=${API_PORT:-3001}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-onebrain}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-onebrain_eu}?schema=public&connection_limit=20&pool_timeout=10&statement_timeout=5000&connect_timeout=5
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET required}
      - JWT_EXPIRY=${JWT_EXPIRY:-15m}
      - REFRESH_TOKEN_EXPIRY=${REFRESH_TOKEN_EXPIRY:-7d}
      - MAGIC_LINK_EXPIRY=${MAGIC_LINK_EXPIRY:-15m}
      - CORS_ORIGIN=${CORS_ORIGIN:?CORS_ORIGIN required}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - MAIL_FROM=${MAIL_FROM:-OneBrain <noreply@onebrain.rocks>}
      - API_PUBLIC_URL=${API_PUBLIC_URL:-}
      - TOTP_ENCRYPTION_KEY=${TOTP_ENCRYPTION_KEY:?TOTP_ENCRYPTION_KEY required in production}
      - MEMORY_ENCRYPTION_KEY=${MEMORY_ENCRYPTION_KEY:?MEMORY_ENCRYPTION_KEY required in production}
      - AGENT_PROVISIONING_KEY=${AGENT_PROVISIONING_KEY:-}
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      region-eu:
      control:
        aliases:
          - api-eu
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://127.0.0.1:${API_PORT:-3001}/health']
      interval: 30s
      timeout: 5s
      retries: 3

  mcp:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.mcp
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    environment:
      - ONEBRAIN_API_URL=http://api:${API_PORT:-3001}
      - ONEBRAIN_API_KEY=${MCP_API_KEY:-}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - region-eu

  # Run migrations on startup
  migrate:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    working_dir: /app/packages/db
    command: npx prisma migrate deploy
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-onebrain}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-onebrain_eu}?schema=public&connection_limit=20&pool_timeout=10&statement_timeout=5000&connect_timeout=5
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - region-eu
    restart: 'no'

volumes:
  postgres_data:
  redis_data:

networks:
  region-eu:
    name: onebrain-eu
  control:
    name: onebrain-control
    external: true
