name: Bug Report
description: Report a bug or unexpected behavior
labels: ['bug']
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - API
        - Web Dashboard
        - MCP Server
        - Database/Schema
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Git commit hash or version number
