name: Feature Request
description: Suggest a new feature or improvement
labels: ['enhancement']
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this feature solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative approaches you've thought about.
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - API
        - Web Dashboard
        - MCP Server
        - Context Engine
        - Database/Schema
        - Infrastructure
        - Other
    validations:
      required: true
