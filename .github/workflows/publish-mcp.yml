name: Publish MCP

on:
  push:
    tags:
      - 'mcp-v*'

permissions:
  contents: read

env:
  PNPM_VERSION: '9.15.0'
  NODE_VERSION: '20'

jobs:
  publish:
    name: Build & Publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm --filter @onebrain/shared run build

      - name: Build MCP
        run: pnpm --filter onebrain-mcp run build

      - name: Run MCP tests
        run: pnpm --filter onebrain-mcp run test

      - name: Publish to npm
        run: cd apps/mcp && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
